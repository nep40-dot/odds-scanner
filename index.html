<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALSHI_LIVE_SYNC_V5</title>
    <style>
        :root {
            --bg: #050505; --text: #00ff41; --accent: #00bcff;
            --kalshi: #ff00ff; --border: #222; --gold: #ffcc00;
        }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Courier New', monospace; margin: 0; padding: 15px; font-size: 12px;
        }
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        header { border-bottom: 2px solid var(--text); margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        /* Kalshi Live Feed */
        .sidebar { background: #111; border: 1px solid var(--kalshi); padding: 15px; height: fit-content; position: sticky; top: 15px; }
        .k-item { border-bottom: 1px solid #333; padding: 8px 0; font-size: 10px; cursor: pointer; }
        .k-item:hover { background: #1a1a1a; }
        .k-ticker { color: var(--kalshi); font-weight: bold; }
        .k-price { float: right; color: #fff; }

        .card { border: 1px solid var(--border); margin-bottom: 15px; padding: 10px; background: #0a0a0a; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #222; padding: 6px; text-align: center; }
        
        .ev-hit { background: rgba(0, 255, 65, 0.2); border: 1px solid var(--text); font-weight: bold; }
        .loading { animation: pulse 1.5s infinite; opacity: 0.5; }
        @keyframes pulse { 50% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div>> KALSHI_AUTO_SYNC_V5.0</div>
    <div id="api-status">PULSES: --</div>
</header>

<div class="layout">
    <aside class="sidebar">
        <h2 style="color:var(--kalshi); font-size: 1.1em; margin-top:0;">[ KALSHI_LIVE_FEED ]</h2>
        <div id="k-list">
            <div class="loading">CONNECTING_TO_KALSHI_API...</div>
        </div>
        <p style="font-size: 9px; margin-top: 10px; opacity: 0.6;">*Click a Kalshi market to "lock" it for comparison.</p>
    </aside>

    <main>
        <div style="margin-bottom: 15px;">
            <select id="sport-select" onchange="refreshAll()">
                <option value="basketball_nba">NBA</option>
                <option value="americanfootball_nfl">NFL</option>
            </select>
            <button onclick="refreshAll()">REFRESH_ALL</button>
        </div>
        <div id="results"></div>
    </main>
</div>

<script>
    const ODDS_API_KEY = 'a214334483f09eb0fa402ade597242d8';
    // We use a public CORS proxy to bypass Kalshi's browser restrictions
    const PROXY = 'https://api.allorigins.win/raw?url=';
    const KALSHI_URL = 'https://api.elections.kalshi.com/trade-api/v2/markets?status=open&limit=15&category=Sports';

    let activeKalshiPrice = null;

    async function fetchKalshi() {
        const kList = document.getElementById('k-list');
        try {
            const res = await fetch(PROXY + encodeURIComponent(KALSHI_URL));
            const data = await res.json();
            
            kList.innerHTML = '';
            data.markets.forEach(m => {
                const div = document.createElement('div');
                div.className = 'k-item';
                // Kalshi returns prices in cents (e.g. 52 = 52%)
                div.onclick = () => { activeKalshiPrice = m.yes_bid / 100; alert(`Locked Kalshi Price: ${m.yes_bid}¢`); };
                div.innerHTML = `<span class="k-ticker">${m.ticker}</span> <span class="k-price">${m.yes_bid}¢</span><br>${m.title}`;
                kList.appendChild(div);
            });
        } catch (e) {
            kList.innerHTML = '<span style="color:red">KALSHI_OFFLINE (CORS_LIMIT)</span>';
        }
    }

    async function fetchOdds() {
        const sport = document.getElementById('sport-select').value;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = '<div class="loading">SYNCING_SPORTSBOOKS...</div>';

        try {
            const res = await fetch(`https://api.the-odds-api.com/v4/sports/${sport}/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=h2h&bookmakers=draftkings,fanduel,betmgm`);
            const data = await res.json();
            document.getElementById('api-status').innerText = `PULSES: ${res.headers.get('x-requests-remaining')}`;
            render(data);
        } catch (e) {
            resDiv.innerHTML = 'ODDS_API_ERROR';
        }
    }

    function amToProb(am) {
        const val = parseFloat(am);
        const dec = val > 0 ? (val/100)+1 : (100/Math.abs(val))+1;
        return 1 / dec;
    }

    function decToAm(dec) {
        if (dec >= 2) return `+${Math.round((dec - 1) * 100)}`;
        return `${Math.round(-100 / (dec - 1))}`;
    }

    function render(data) {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = '';

        data.forEach(game => {
            const card = document.createElement('div');
            card.className = 'card';
            let html = `<strong>${game.away_team} @ ${game.home_team}</strong><table><tr><th>BOOK</th><th>AWAY</th><th>HOME</th></tr>`;

            game.bookmakers.forEach(bm => {
                const m = bm.markets[0];
                const awayAm = decToAm(m.outcomes[1].price);
                const homeAm = decToAm(m.outcomes[0].price);
                
                // If a Kalshi price is clicked, highlight the edge
                const awayProb = amToProb(awayAm);
                const isEdge = activeKalshiPrice && (activeKalshiPrice > (awayProb + 0.03));

                html += `<tr><td>${bm.title}</td>
                    <td class="${isEdge ? 'ev-hit' : ''}">${awayAm}</td>
                    <td>${homeAm}</td></tr>`;
            });

            html += `</table>`;
            card.innerHTML = html;
            resDiv.appendChild(card);
        });
    }

    function refreshAll() {
        fetchKalshi();
        fetchOdds();
    }

    window.onload = refreshAll;
</script>
</body>
</html>
