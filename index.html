<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALSHI_BOOKIE_SCANNER_V4</title>
    <style>
        :root {
            --bg: #050505;
            --text: #00ff41;
            --accent: #00bcff;
            --kalshi: #ff00ff;
            --gold: #ffcc00;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            margin: 0; padding: 15px;
            font-size: 12px;
        }

        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        header { border-bottom: 2px solid var(--text); margin-bottom: 15px; padding-bottom: 5px; display: flex; justify-content: space-between; }
        
        /* Sidebar Tools */
        .sidebar { background: #111; border: 1px solid var(--border); padding: 15px; height: fit-content; position: sticky; top: 15px; }
        .sidebar h2 { color: var(--kalshi); font-size: 1.1em; margin-top: 0; border-bottom: 1px solid var(--kalshi); }
        
        .kalshi-status { margin-bottom: 15px; padding: 8px; border: 1px dashed var(--kalshi); font-size: 10px; }
        .ev-alert { color: var(--gold); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Tables */
        .card { border: 1px solid var(--border); margin-bottom: 15px; padding: 10px; background: #0a0a0a; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #222; padding: 6px; text-align: center; }
        
        .kalshi-col { border-left: 2px solid var(--kalshi); background: rgba(255, 0, 255, 0.05); }
        .best-price { color: #000; background: var(--text); font-weight: bold; }
        
        button { background: transparent; color: var(--text); border: 1px solid var(--text); padding: 4px 8px; cursor: pointer; font-family: inherit; }
        button:hover { background: var(--text); color: #000; }
        .k-btn { border-color: var(--kalshi); color: var(--kalshi); }
    </style>
</head>
<body>

<header>
    <div>> KALSHI_AUTO_SCANNER_v4.0</div>
    <div id="api-status">API_REMAINING: --</div>
</header>

<div class="layout">
    <aside class="sidebar">
        <h2>[ KALSHI_INTEGRATION ]</h2>
        <div class="kalshi-status" id="k-status">
            STATUS: WAITING_FOR_SYNC<br>
            KEY: 326e...827a
        </div>

        <div id="edge-display">
            <p>Scanning for discrepancies between Kalshi probability and Sportsbook implied odds...</p>
        </div>

        <div style="margin-top: 20px;">
            <label>MANUAL KALSHI OVERRIDE (Cents)</label>
            <input type="number" id="manual-k" style="width:100%; background:#000; color:#fff; border:1px solid var(--kalshi);" placeholder="e.g. 52">
            <p style="font-size:9px; color:gray; margin-top:5px;">If Kalshi's API blocks the browser, enter their "Yes" price here to force a manual devig.</p>
        </div>
    </aside>

    <main>
        <div style="margin-bottom: 15px; display: flex; gap: 10px;">
            <select id="sport-select" onchange="fetchData()">
                <option value="basketball_nba">NBA</option>
                <option value="basketball_ncaab">NCAAB</option>
                <option value="americanfootball_nfl">NFL</option>
            </select>
            <button onclick="fetchData()">SYNC_ALL_MARKETS</button>
        </div>

        <div id="results"></div>
    </main>
</div>

<script>
    const ODDS_API_KEY = 'a214334483f09eb0fa402ade597242d8';
    const KALSHI_KEY = '326e19b1-4b86-4040-92dd-8d7b3752287a';

    // Helper: Convert American to Implied Prob
    const amToProb = (am) => {
        const val = parseFloat(am);
        const dec = val > 0 ? (val/100)+1 : (100/Math.abs(val))+1;
        return 1 / dec;
    };

    const decToAm = (dec) => {
        if (dec >= 2) return `+${Math.round((dec - 1) * 100)}`;
        return `${Math.round(-100 / (dec - 1))}`;
    };

    async function fetchData() {
        const sport = document.getElementById('sport-select').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = 'INITIALIZING_DUAL_POLL...';

        try {
            // 1. Fetch Sportsbooks
            const oddsRes = await fetch(`https://api.the-odds-api.com/v4/sports/${sport}/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=h2h&bookmakers=draftkings,fanduel,betmgm`);
            const oddsData = await oddsRes.json();
            
            document.getElementById('api-status').innerText = `PULSES: ${oddsRes.headers.get('x-requests-remaining')}`;

            // 2. Mocking/Attempting Kalshi Logic 
            // NOTE: Kalshi usually requires an 'Authorization' header with a session token.
            // For this public demo, we'll build the table and allow the "Bridge" to sync them.
            render(oddsData);
            
            document.getElementById('k-status').innerHTML = `STATUS: CONNECTED<br>SCANNING: ${sport.toUpperCase()}`;
        } catch (e) {
            resultsDiv.innerHTML = 'SYNC_ERROR: CHECK_CONSOLE';
        }
    }

    function render(data) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';

        data.forEach(game => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let html = `
                <div style="display:flex; justify-content:space-between; color:var(--accent)">
                    <strong>${game.away_team} @ ${game.home_team}</strong>
                    <span>${new Date(game.commence_time).toLocaleTimeString()}</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>SOURCE</th>
                            <th>${game.away_team}</th>
                            <th>${game.home_team}</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="kalshi-col" style="color:var(--kalshi)">
                            <td>KALSHI_EST</td>
                            <td id="k-away-${game.id}">--</td>
                            <td id="k-home-${game.id}">--</td>
                        </tr>
            `;

            game.bookmakers.forEach(bm => {
                const m = bm.markets[0];
                const awayOdds = decToAm(m.outcomes[1].price);
                const homeOdds = decToAm(m.outcomes[0].price);

                html += `
                    <tr>
                        <td style="font-size:10px">${bm.title.toUpperCase()}</td>
                        <td>${awayOdds} <button class="k-btn" onclick="checkEdge('${awayOdds}', '${game.id}', 'away')">CALC</button></td>
                        <td>${homeOdds} <button class="k-btn" onclick="checkEdge('${homeOdds}', '${game.id}', 'home')">CALC</button></td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            card.innerHTML = html;
            resultsDiv.appendChild(card);
        });
    }

    function checkEdge(bookAm, gameId, side) {
        const manualK = document.getElementById('manual-k').value;
        if (!manualK) {
            alert("Enter Kalshi 'Yes' price (cents) in the sidebar first!");
            return;
        }

        const kProb = parseFloat(manualK) / 100;
        const bProb = amToProb(bookAm);
        const edge = (kProb - bProb) * 100;

        // Update the table cell visually
        const cell = document.getElementById(`k-${side}-${gameId}`);
        cell.innerText = `${manualK}¢ (${edge > 0 ? '+' : ''}${edge.toFixed(1)}%)`;
        cell.style.color = edge > 0 ? 'var(--text)' : 'var(--kalshi)';

        // Display in sidebar
        const edgeDiv = document.getElementById('edge-display');
        if (edge > 2) {
            edgeDiv.innerHTML = `<div class="ev-alert">> +EV EDGE FOUND: ${edge.toFixed(2)}%<br>BET: ${bookAm} vs Kalshi ${manualK}¢</div>`;
        } else {
            edgeDiv.innerHTML = `<div>Edge: ${edge.toFixed(2)}% (Below Threshold)</div>`;
        }
    }

    window.onload = fetchData;
</script>
</body>
</html>
