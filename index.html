<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV_NINJA_TERMINAL_V2</title>
    <style>
        :root {
            --bg: #050505;
            --text: #00ff41;
            --dim-text: #008f11;
            --border: #222;
            --ev-gold: #ffcc00;
            --win-green: #00ff41;
            --loss-red: #ff3e3e;
            --accent: #00bcff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            margin: 0; padding: 15px;
            font-size: 13px;
        }

        /* Layout */
        .grid-container { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        header { border-bottom: 2px solid var(--text); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Devig Tool Styling */
        .devig-tool {
            background: #111;
            border: 1px solid var(--accent);
            padding: 15px;
            position: sticky;
            top: 15px;
            height: fit-content;
        }

        .devig-tool h2 { color: var(--accent); margin-top: 0; font-size: 1.2em; border-bottom: 1px solid var(--accent); }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.8em; margin-bottom: 3px; color: var(--accent); }
        input { background: #000; border: 1px solid var(--accent); color: #fff; padding: 5px; font-family: inherit; }

        .ev-result {
            margin-top: 15px;
            padding: 10px;
            border: 1px dashed var(--ev-gold);
            background: #1a1500;
        }

        /* Odds Display */
        .controls { background: #111; padding: 10px; border: 1px solid var(--border); margin-bottom: 15px; display: flex; gap: 10px; align-items: center;}
        select, button { background: #000; color: var(--text); border: 1px solid var(--text); padding: 5px; cursor: pointer; }
        button:hover { background: var(--text); color: #000; }

        .game-card { border: 1px solid var(--border); margin-bottom: 15px; padding: 10px; background: #0a0a0a; }
        .game-header { font-weight: bold; margin-bottom: 8px; color: var(--accent); display: flex; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #222; padding: 6px; text-align: center; }
        .best { background: rgba(0, 255, 65, 0.2); color: #fff; font-weight: bold; border: 1px solid var(--text); }
        
        .quick-devig-btn { font-size: 10px; padding: 2px 4px; margin-left: 5px; border-color: var(--accent); color: var(--accent); }
        
        .status-bar { font-size: 11px; opacity: 0.7; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div>> EV_NINJA_TERMINAL_V2.0</div>
    <div id="api-usage">REMAINING_PULSES: --</div>
</header>

<div class="grid-container">
    <aside class="devig-tool">
        <h2>[ CALCULATOR_MODULE ]</h2>
        <div class="input-group">
            <label>YOUR ODDS (American)</label>
            <input type="text" id="target-odds" placeholder="+110" oninput="runManualDevig()">
        </div>
        <div class="input-group">
            <label>FAIR MARKET SIDE A (e.g. -120)</label>
            <input type="text" id="market-a" placeholder="-120" oninput="runManualDevig()">
        </div>
        <div class="input-group">
            <label>FAIR MARKET SIDE B (e.g. +100)</label>
            <input type="text" id="market-b" placeholder="+100" oninput="runManualDevig()">
        </div>
        <div class="input-group">
            <label>BANKROLL ($)</label>
            <input type="number" id="bankroll" value="1000" oninput="runManualDevig()">
        </div>

        <div id="devig-output" class="ev-result">
            Enter odds to calculate EV...
        </div>
    </aside>

    <main>
        <div class="controls">
            SPORT: <select id="sport-select" onchange="fetchOdds()">
                <option value="basketball_nba">NBA</option>
                <option value="basketball_ncaab">NCAAB</option>
                <option value="icehockey_nhl">NHL</option>
                <option value="baseball_mlb">MLB</option>
                <option value="americanfootball_nfl">NFL</option>
                <option value="soccer_epl">EPL</option>
            </select>
            MARKET: <select id="market-select" onchange="fetchOdds()">
                <option value="h2h">Moneyline</option>
                <option value="spreads">Spreads</option>
                <option value="totals">Totals</option>
            </select>
            <button onclick="fetchOdds()">REFRESH_FEED</button>
        </div>

        <div id="results"></div>
    </main>
</div>

<script>
    const API_KEY = 'a214334483f09eb0fa402ade597242d8';
    const BOOKMAKERS = 'draftkings,fanduel,betmgm,caesars,betrivers';

    // Math Utilities
    function amToDec(american) {
        const num = parseFloat(american);
        return num >= 0 ? (num / 100) + 1 : (100 / Math.abs(num)) + 1;
    }

    function decToAm(decimal) {
        if (decimal >= 2) return `+${Math.round((decimal - 1) * 100)}`;
        return `${Math.round(-100 / (decimal - 1))}`;
    }

    // "The Ninja Devigger" Logic
    function runManualDevig() {
        const targetAm = document.getElementById('target-odds').value;
        const mktA = document.getElementById('market-a').value;
        const mktB = document.getElementById('market-b').value;
        const bankroll = parseFloat(document.getElementById('bankroll').value) || 0;

        if (!targetAm || !mktA || !mktB) return;

        const decTarget = amToDec(targetAm);
        const decA = amToDec(mktA);
        const decB = amToDec(mktB);

        // Power Devig / Multiplicative
        const sumImplied = (1/decA) + (1/decB);
        const fairWinProb = (1/decA) / sumImplied;
        const fairOddsDec = 1 / fairWinProb;

        const ev = (fairWinProb * (decTarget - 1) - (1 - fairWinProb)) * 100;
        
        // Kelly Criterion (Quarter Kelly)
        const b = decTarget - 1;
        const q = 1 - fairWinProb;
        const kelly = ((b * fairWinProb - q) / b) * 0.25; // 0.25 for safety
        const suggestBet = Math.max(0, kelly * bankroll).toFixed(2);

        document.getElementById('devig-output').innerHTML = `
            <div style="color:var(--ev-gold); font-weight:bold;">EXPECTED VALUE: ${ev.toFixed(2)}%</div>
            <div>FAIR ODDS: ${decToAm(fairOddsDec)} (${(fairWinProb*100).toFixed(1)}%)</div>
            <div style="margin-top:10px; border-top:1px solid #444; padding-top:5px;">
                SUGGESTED BET (0.25 Kelly): $${suggestBet}
            </div>
        `;
    }

    function sendToDevig(odds, sideA, sideB) {
        document.getElementById('target-odds').value = odds;
        document.getElementById('market-a').value = sideA;
        document.getElementById('market-b').value = sideB;
        runManualDevig();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function fetchOdds() {
        const sport = document.getElementById('sport-select').value;
        const market = document.getElementById('market-select').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = 'SCANNING_AIRWAVES...';

        try {
            const res = await fetch(`https://api.the-odds-api.com/v4/sports/${sport}/odds/?apiKey=${API_KEY}&regions=us&markets=${market}&oddsFormat=decimal&bookmakers=${BOOKMAKERS}`);
            const data = await res.json();
            document.getElementById('api-usage').innerText = `REMAINING_PULSES: ${res.headers.get('x-requests-remaining')}`;
            render(data, market);
        } catch (e) {
            resultsDiv.innerHTML = 'ERROR_ACCESSING_API';
        }
    }

    function render(data, market) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';

        data.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            
            // Logic to find best price per outcome
            let bestPrices = {};
            game.bookmakers.forEach(bm => {
                bm.markets[0].outcomes.forEach(o => {
                    const id = o.name + (o.point || '');
                    if (!bestPrices[id] || o.price > bestPrices[id]) bestPrices[id] = o.price;
                });
            });

            let html = `
                <div class="game-header">
                    <span>${game.away_team} @ ${game.home_team}</span>
                    <span style="font-size:0.8em; color:var(--text)">${new Date(game.commence_time).toLocaleTimeString()}</span>
                </div>
                <table>
                    <thead><tr><th>BOOK</th>`;
            
            const outcomes = game.bookmakers[0]?.markets[0].outcomes || [];
            outcomes.forEach(o => html += `<th>${o.name} ${o.point ?? ''}</th>`);
            html += `</tr></thead><tbody>`;

            game.bookmakers.forEach(bm => {
                html += `<tr><td style="font-size:10px">${bm.title.toUpperCase()}</td>`;
                const m = bm.markets[0];
                m.outcomes.forEach((o, i) => {
                    const isBest = o.price === bestPrices[o.name + (o.point || '')];
                    const amOdds = decToAm(o.price);
                    
                    // Button to push these odds and the opposite side to the devigger
                    const otherSide = m.outcomes[i === 0 ? 1 : 0].price;
                    const quickDevig = `<button class="quick-devig-btn" onclick="sendToDevig('${amOdds}', '${decToAm(o.price)}', '${decToAm(otherSide)}')">DEVIG</button>`;
                    
                    html += `<td class="${isBest ? 'best' : ''}">${amOdds}${quickDevig}</td>`;
                });
                html += `</tr>`;
            });

            html += `</tbody></table>`;
            card.innerHTML = html;
            resultsDiv.appendChild(card);
        });
    }

    window.onload = fetchOdds;
</script>
</body>
</html>
